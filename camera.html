<html>
  <head>
    <meta charset="UTF-8">
    <title>My Camera</title>
    <style>
     body {
       margin: 0;
       padding: 0;
     }
     video {
       position: fixed;
       top: 0;
       left: 0;
       width: 100vw;
       height: calc(100vh - 110px);
       object-fit: cover;
     }
     canvas {
       position: fixed;
       top: 0;
       left: 0;
       width: 100vw;
       height: calc(100vh - 210px);
     }
     .capture {
       display: flex;
       position: fixed;
       align-items: center;
       justify-content: center;
       padding: 5px;
       border-top: 1px solid;
       width: 100%;
       height: 200px;
       bottom: 0;
       background: #000;
     }
     .capture button {
       border: none;
       border-radius: 100%;
       width: 200px;
       height: 200px;
     }

     @media screen and (orientation: landscape) {
       video {
         width: calc(100vw - 110px);
         height: 100vh;
       }
       canvas {
         width: calc(100vw - 110px);
         height: 100vh;
       }
       .capture {
         border-left: 1px solid;
         width: 100px;
         height: 100%;
         right: 0;
       }
       .capture button {
         width: 100px;
         height: 100px;
       }
     }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <video id="video" autoplay playsinline>Video stream not available.</video>

    <div class="capture">
      <button id="button"></button>
    </div>

    <script type="text/javascript">
    class CanvasManager {
      constructor(canvasId) {
        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext("2d");
        this.offscreen = document.createElement("canvas");
        this.isReady = false;

        this._bindEvents();
      }

      _bindEvents() {
        let resizeTimer;

        window.addEventListener("resize", () => {
          clearTimeout(resizeTimer);

          this.save();

          resizeTimer = setTimeout(() => {
            this._resize();
            this.restore();
          }, 100);
        });
      }

      _resize() {
        this.canvas.width = this.canvas.offsetWidth;
        this.canvas.height = this.canvas.offsetHeight;
      }

      save() {
        if (!this.isReady) return;
        this.offscreen.width = this.canvas.width;
        this.offscreen.height = this.canvas.height;
        this.offscreen.getContext('2d').drawImage(this.canvas, 0, 0);
      }

      restore() {
        if (!this.offscreen.width) return;
        this.ctx.drawImage(
          this.offscreen,
          0, 0,
          this.canvas.width,
          this.canvas.height
        );
      }

      markReady() {
        this.isReady = true;
      }
    }

    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const button = document.getElementById("button");

    const constraints = {
      video: {
        facingMode: { exact: "environment" },
      },
      audio: false
    };

    canvas.setAttribute("width", document.documentElement.clientWidth);
    canvas.setAttribute("height", document.documentElement.clientHeight);

    screen.orientation.addEventListener("change", () => {
      canvas.setAttribute("width", document.documentElement.clientWidth);
      canvas.setAttribute("height", document.documentElement.clientHeight);
    });

    let streaming = false;
    let isCpatured = false;
    let originalImage = null;

    navigator.mediaDevices
             .getUserMedia(constraints)
             .then((stream) => {
               const videoTracks = stream.getVideoTracks();
               console.log("Got stream with constraints:", constraints);
               console.log(`Using video device: ${videoTracks[0].label}`);
               stream.onremovetrack = () => {
                 console.log("Stream ended");
               };
               video.srcObject = stream;
               video.onloadedmetadata = () => video.play();
             })
             .catch((error) => {
               if (error.name === "OverconstrainedError") {
                 console.error(
                   `The resolution ${constraints.video.width.exact}x${constraints.video.height.exact} px is not supported by your device.`,
                 );
               } else if (error.name === "NotAllowedError") {
                 console.error(
                   "You need to grant this page permission to access your camera and microphone.",
                 );
               } else {
                 console.error(`getUserMedia error: ${error.name}`, error);
               }
             });

    function takePicture() {
      isCpatured = true;
      const context = canvas.getContext("2d");
      context.drawImage(video, 0, 0, canvas.width, canvas.height);
      const data = canvas.toDataURL("image/png");

      video.style.display = "none";

      context.font = "30px Arial";
      context.fillStyle = "white";
      context.strokeStyle = "white";
      context.lineWidth = 1;
      context.textAlign = "right"; 
      context.textBaseline = "bottom"; 
      const now = new Date();
      const dateStr = now.toLocaleDateString() + ' ' + now.toLocaleTimeString();

      context.fillText(dateStr, canvas.width - 10, canvas.height - 10);
      context.strokeText(dateStr, canvas.width - 10, canvas.height - 10);
      /* context.fillText(dateStr, 10, 30); */
      /* context.strokeText(dateStr, 10, 30); */

      const newImageData = canvas.toDataURL("image/png");
      const img = new Image();
      img.src = newImageData;
      originalImage = img;
      context.drawImage(img, 0, 0, canvas.width, canvas.height);

      /* const a = document.createElement("a");
       * a.href = newImageData;
       * a.download = "test.png";

       * document.body.appendChild(a);
       * a.click();
       * window.URL.revokeObjectURL(a); */
    }

    function clearPhoto() {
      const context = canvas.getContext("2d");
      context.fillStyle = "#fff";
      context.fillRect(0, 0, canvas.width, canvas.height);
    }

    button.addEventListener("click", (e) => {
      if (isCpatured) {
        clearPhoto();
        isCpatured = false;
        video.style.display = "block";
        return;
      }
      takePicture();
      e.preventDefault();
    });

    window.addEventListener("resize", () => {
      if (!originalImage) return;
      const context = canvas.getContext("2d");
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      context.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
    });
    </script>
  </body>
</html>
