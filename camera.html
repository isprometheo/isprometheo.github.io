<html>
  <head>
    <meta charset="UTF-8">
    <title>카메라 테스트</title>
    <style>
     body {
       margin: 0;
       padding: 0;
     }
     video {
       position: fixed;
       top: 0;
       left: 0;
       width: 100vw;
       height: 100vh;
       object-fit: cover;
     }
     canvas {
       position: fixed;
       top: 0;
       left: 0;
       width: 100vw;
       height: 100vh;
       object-fit: cover;
     }
     .capture {
       display: flex;
       position: fixed;
       align-items: center;
       justify-content: center;
       padding: 5px;
       border-top: 1px solid;
       width: 100%;
       height: 100px;
       bottom: 0;
     }
     .capture button {
       border: none;
       border-radius: 100%;
       width: 100px;
       height: 100px;
     }

     @media screen and (orientation: landscape) {
       .capture {
         border-left: 1px solid;
         width: 100px;
         height: 100%;
         right: 0;
       }
     }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <video id="video" autoplay playsinline>Video stream not available.</video>

    <div class="capture">
      <button id="button">찍기</button>
    </div>

    <script type="text/javascript">
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const button = document.getElementById("button");

    const constraints = {
      video: {
        facingMode: { exact: "environment" },
      },
      audio: false
    };

    canvas.setAttribute("width", document.documentElement.clientWidth);
    canvas.setAttribute("height", document.documentElement.clientHeight);

    screen.orientation.addEventListener("change", () => {
      canvas.setAttribute("width", document.documentElement.clientWidth);
      canvas.setAttribute("height", document.documentElement.clientHeight);
    });

    let streaming = false;
    let isCpatured = false;

    navigator.mediaDevices
             .getUserMedia(constraints)
             .then((stream) => {
               const videoTracks = stream.getVideoTracks();
               console.log("Got stream with constraints:", constraints);
               console.log(`Using video device: ${videoTracks[0].label}`);
               stream.onremovetrack = () => {
                 console.log("Stream ended");
               };
               video.srcObject = stream;
               video.onloadedmetadata = () => video.play();
             })
             .catch((error) => {
               if (error.name === "OverconstrainedError") {
                 console.error(
                   `The resolution ${constraints.video.width.exact}x${constraints.video.height.exact} px is not supported by your device.`,
                 );
               } else if (error.name === "NotAllowedError") {
                 console.error(
                   "You need to grant this page permission to access your camera and microphone.",
                 );
               } else {
                 console.error(`getUserMedia error: ${error.name}`, error);
               }
             });

    function takePicture() {
      isCpatured = true;
      const context = canvas.getContext("2d");
      context.drawImage(video, 0, 0, canvas.width, canvas.height);
      const data = canvas.toDataURL("image/png");

      button.innerText = "다시 찍기";
      video.style.display = "none";

      context.font = '30px Arial';
      context.fillStyle = 'white';
      context.strokeStyle = 'black';
      context.lineWidth = 1;

      const now = new Date();
      const dateStr = now.toLocaleDateString() + ' ' + now.toLocaleTimeString();

      context.fillText(dateStr, canvas.width, canvas.height - 10);
      context.strokeText(dateStr, canvas.width, canvas.height - 10);

      const newImageData = canvas.toDataURL("image/png");
      const img = new Image();
      img.src = newImageData;
      context.drawImage(img, 0, 0, canvas.width, canvas.height);

      /* const a = document.createElement("a");
       * a.href = newImageData;
       * a.download = "test.png";

       * document.body.appendChild(a);
       * a.click();
       * window.URL.revokeObjectURL(a); */
    }

    function clearPhoto() {
      const context = canvas.getContext("2d");
      context.fillStyle = "#fff";
      context.fillRect(0, 0, canvas.width, canvas.height);
    }

    button.addEventListener("click", (e) => {
      if (isCpatured) {
        clearPhoto();
        isCpatured = false;
        button.innerText = "찍기";
        video.style.display = "block";
        return;
      }
      takePicture();
      e.preventDefault();
    });
    </script>
  </body>
</html>
